<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <pattern id="hex" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 40 10 L 40 30 L 20 40 L 0 30 L 0 10 Z" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#hex)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- sport score cards (right decorative) -->
  <g opacity="0.2" transform="translate(860,50)">
    <!-- score card 1 -->
    <rect x="0"   y="0"  width="130" height="60" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
    <text x="10"  y="22" font-family="monospace" font-size="12" fill="#aaa">⚽ Premier League</text>
    <text x="10"  y="46" font-family="Arial Black,sans-serif" font-size="20" fill="#fff">MCI  2 - 1  ARS</text>
    <!-- live dot -->
    <circle cx="118" cy="10" r="5" fill="#ef4444"/>
    <!-- score card 2 -->
    <rect x="150" y="0"  width="130" height="60" rx="8" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
    <text x="160" y="22" font-family="monospace" font-size="12" fill="#aaa">🏀 NBA</text>
    <text x="160" y="46" font-family="Arial Black,sans-serif" font-size="20" fill="#fff">LAL 108-102 BOS</text>
    <!-- score card 3 -->
    <rect x="0"   y="80" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
    <text x="10"  y="102" font-family="monospace" font-size="12" fill="#aaa">🏈 NFL</text>
    <text x="10"  y="126" font-family="Arial Black,sans-serif" font-size="20" fill="#fff">KC  28 - 21  SF</text>
    <circle cx="118" cy="90" r="5" fill="#ef4444"/>
    <!-- score card 4 -->
    <rect x="150" y="80" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
    <text x="160" y="102" font-family="monospace" font-size="12" fill="#aaa">🎾 Tennis</text>
    <text x="160" y="126" font-family="Arial Black,sans-serif" font-size="20" fill="#fff">DJO 6-4 ALC</text>
  </g>
  <!-- logo: pulse circle E -->
  <g transform="translate(80,85)" filter="url(#glow)">
    <circle cx="60" cy="60" r="55" fill="#0f0f1e" stroke="url(#acc)" stroke-width="3"/>
    <!-- pulse rings -->
    <circle cx="60" cy="60" r="42" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
    <text x="33" y="82" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" fill="url(#acc)">EP</text>
  </g>
  <!-- wordmark -->
  <text x="222" y="100" font-family="sans-serif" font-size="14" fill="#ef4444" opacity="0.6" letter-spacing="5">LIVE SPORTS DASHBOARD</text>
  <text x="220" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="#f8f8ff">EventPulse</text>
  <text x="220" y="220" font-family="sans-serif" font-size="19" fill="url(#acc)" letter-spacing="3" opacity="0.9">8 SPORTS · ESPN API · OBS READY · ZERO CONFIG</text>
  <rect x="220" y="238" width="520" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="255" width="80" height="28" rx="14" fill="#ef4444" opacity="0.2"/>
  <text x="262" y="274" font-family="sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">🔴 LIVE</text>
  <rect x="314" y="255" width="110" height="28" rx="14" fill="#ef4444" opacity="0.15"/>
  <text x="369" y="274" font-family="sans-serif" font-size="13" fill="#f97316" text-anchor="middle">Free Forever</text>
  <rect x="436" y="255" width="130" height="28" rx="14" fill="#ef4444" opacity="0.15"/>
  <text x="501" y="274" font-family="sans-serif" font-size="13" fill="#f97316" text-anchor="middle">OBS Compatible</text>
</svg>