<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#0d0d14"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- scoreboard preview (right) -->
  <g opacity="0.22" transform="translate(830,46)">
    <!-- match card 1 -->
    <rect x="0" y="0" width="380" height="70" rx="8" fill="#0d0d14" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="5" fill="#ef4444" opacity="0.9"/>
    <text x="30" y="21" font-family="monospace" font-size="10" fill="#ef4444">LIVE</text>
    <text x="16" y="44" font-family="Arial Black,sans-serif" font-size="14" fill="#fff">Manchester City</text>
    <text x="16" y="62" font-family="Arial Black,sans-serif" font-size="14" fill="#9ca3af">Arsenal</text>
    <text x="310" y="44" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">2 - 1</text>
    <text x="360" y="44" font-family="monospace" font-size="11" fill="#eab308">67'</text>
    <!-- match card 2 -->
    <rect x="0" y="78" width="380" height="70" rx="8" fill="#0d0d14" stroke="#22c55e" stroke-width="1"/>
    <text x="16" y="102" font-family="Arial Black,sans-serif" font-size="13" fill="#f0f0f0">LA Lakers</text>
    <text x="16" y="120" font-family="Arial Black,sans-serif" font-size="13" fill="#9ca3af">Golden State</text>
    <text x="310" y="107" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="#22c55e" text-anchor="middle">FT</text>
    <text x="352" y="107" font-family="monospace" font-size="13" fill="#f0f0f0">108-94</text>
    <!-- match card 3 -->
    <rect x="0" y="156" width="380" height="60" rx="8" fill="#0d0d14" stroke="#3b82f6" stroke-width="1"/>
    <text x="16" y="180" font-family="Arial Black,sans-serif" font-size="13" fill="#f0f0f0">Djokovic vs Alcaraz</text>
    <text x="16" y="198" font-family="monospace" font-size="11" fill="#3b82f6">ATP Final · Centre Court</text>
    <!-- sports icons row -->
    <text x="0" y="240" font-family="sans-serif" font-size="18">&#x26BD; &#x1F3C0; &#x1F3C8; &#x1F3BE; &#x1F3D2; &#x26BE;</text>
  </g>
  <!-- logo: pulse/heartbeat with ball -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#050508" stroke="url(#acc)" stroke-width="3"/>
    <!-- pulse line -->
    <polyline points="12,58 28,58 36,28 44,88 52,48 60,68 68,58 104,58" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- REC dot -->
    <circle cx="90" cy="28" r="7" fill="#ef4444" opacity="0.9"/>
    <text x="90" y="32" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">LIVE</text>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="13" fill="#ef4444" opacity="0.6" letter-spacing="4">MULTI-SPORT LIVE DASHBOARD</text>
  <text x="218" y="168" font-family="Arial Black,'Arial Bold',sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="#fffaf0">EventPulse</text>
  <text x="218" y="210" font-family="Arial Black,'Arial Bold',sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="url(#acc)">Chat</text>
  <rect x="220" y="228" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- sport pills -->
  <rect x="222" y="244" width="70" height="26" rx="13" fill="#ef4444" opacity="0.18"/>
  <text x="257" y="262" font-family="monospace" font-size="12" fill="#fca5a5" text-anchor="middle">Soccer</text>
  <rect x="304" y="244" width="60" height="26" rx="13" fill="#f97316" opacity="0.18"/>
  <text x="334" y="262" font-family="monospace" font-size="12" fill="#fdba74" text-anchor="middle">NBA</text>
  <rect x="376" y="244" width="60" height="26" rx="13" fill="#eab308" opacity="0.18"/>
  <text x="406" y="262" font-family="monospace" font-size="12" fill="#fde68a" text-anchor="middle">NFL</text>
  <rect x="448" y="244" width="76" height="26" rx="13" fill="#22c55e" opacity="0.18"/>
  <text x="486" y="262" font-family="monospace" font-size="12" fill="#86efac" text-anchor="middle">Tennis</text>
  <rect x="536" y="244" width="70" height="26" rx="13" fill="#3b82f6" opacity="0.18"/>
  <text x="571" y="262" font-family="monospace" font-size="12" fill="#93c5fd" text-anchor="middle">+4</text>
  <text x="222" y="296" font-family="monospace" font-size="12" fill="#6b7280">ESPN API · 8 Sports · OBS Ready · Zero Config · GitHub Pages</text>
</svg>